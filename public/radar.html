<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#0a0e14; font-family:system-ui,sans-serif; }
#map { position:absolute; top:50px; left:0; right:0; bottom:105px; z-index:1; }
.leaflet-control-attribution { display:none!important; }
.leaflet-control-zoom { border:1px solid rgba(234,179,8,0.3)!important; border-radius:8px!important; overflow:hidden; }
.leaflet-control-zoom a { background:#0d1117!important; color:#eab308!important; border-color:rgba(234,179,8,0.15)!important; }
.leaflet-tooltip { background:rgba(10,14,20,0.95)!important; border:1px solid rgba(234,179,8,0.35)!important; color:#facc15!important; font-size:11px!important; border-radius:7px!important; padding:5px 9px!important; box-shadow:none!important; }
.leaflet-tooltip::before { display:none!important; }

#header {
  position:absolute; top:0; left:0; right:0; height:50px; z-index:1000;
  background:#0a0e14; border-bottom:1px solid rgba(234,179,8,0.2);
  display:flex; align-items:center; padding:0 14px; gap:10px;
}
#logo { color:#facc15; font-size:14px; font-weight:900; letter-spacing:0.1em; flex:1; }
#logo span { color:rgba(234,179,8,0.35); font-weight:400; font-size:10px; margin-left:6px; }
#hcount { background:rgba(234,179,8,0.08); border:1px solid rgba(234,179,8,0.2); color:#facc15; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; white-space:nowrap; }
#htime { color:rgba(234,179,8,0.55); font-size:11px; white-space:nowrap; }
.lpill { display:flex; align-items:center; gap:4px; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#f87171; font-size:10px; font-weight:800; padding:3px 8px; border-radius:20px; white-space:nowrap; }
.ldot { width:5px; height:5px; background:#ef4444; border-radius:50%; animation:lp 1.2s infinite; }
@keyframes lp { 0%,100%{opacity:1} 50%{opacity:0.1} }
#source { font-size:9px; color:rgba(234,179,8,0.3); white-space:nowrap; }

#layers { position:absolute; top:58px; right:10px; z-index:1000; display:flex; flex-direction:column; gap:5px; }
.lb { background:rgba(10,14,20,0.95); border:1px solid rgba(234,179,8,0.2); color:rgba(234,179,8,0.45); font-size:11px; font-weight:700; padding:8px 14px; border-radius:8px; cursor:pointer; transition:all 0.2s; user-select:none; white-space:nowrap; }
.lb:hover { color:#eab308; border-color:rgba(234,179,8,0.5); background:rgba(234,179,8,0.06); }
.lb.on { color:#facc15; border-color:#facc15; background:rgba(234,179,8,0.12); }

#legend { position:absolute; top:58px; left:10px; z-index:1000; background:rgba(10,14,20,0.95); border:1px solid rgba(234,179,8,0.2); border-radius:10px; padding:10px 13px; }
#leg-title { color:#eab308; font-size:9px; font-weight:800; letter-spacing:0.1em; margin-bottom:8px; }
.lr { display:flex; align-items:center; gap:8px; margin:4px 0; font-size:9px; color:rgba(255,255,255,0.45); }
.lc { width:24px; height:6px; border-radius:2px; flex-shrink:0; }

#timeline { position:absolute; bottom:0; left:0; right:0; height:105px; z-index:1000; background:#0a0e14; border-top:1px solid rgba(234,179,8,0.2); padding:10px 14px 10px; display:flex; flex-direction:column; gap:8px; }
#tl-row { display:flex; align-items:center; gap:8px; }
.cb { background:rgba(234,179,8,0.07); border:1px solid rgba(234,179,8,0.2); color:#eab308; border-radius:7px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; width:32px; height:32px; transition:all 0.15s; user-select:none; flex-shrink:0; }
.cb:hover { background:rgba(234,179,8,0.18); border-color:#eab308; }
#playbtn { width:38px; height:38px; font-size:16px; border-radius:9px; }
#playbtn.on { background:rgba(234,179,8,0.2); border-color:#facc15; color:#facc15; }
#tl-info { flex:1; text-align:right; color:rgba(234,179,8,0.35); font-size:10px; }
#scrubber { position:relative; height:5px; background:rgba(234,179,8,0.1); border-radius:3px; cursor:pointer; }
#scrubfill { position:absolute; top:0; left:0; height:100%; background:linear-gradient(90deg,rgba(234,179,8,0.4),#facc15); border-radius:3px; pointer-events:none; }
#scrubhead { position:absolute; top:50%; transform:translate(50%,-50%); width:11px; height:11px; background:#facc15; border-radius:50%; pointer-events:none; right:0; }
#ticks-wrap { position:relative; height:28px; }
#ticks { display:flex; gap:2px; position:absolute; top:14px; left:0; right:0; }
.tk { flex:1; height:5px; background:rgba(234,179,8,0.12); border-radius:2px; cursor:pointer; transition:background 0.1s; }
.tk:hover { background:rgba(234,179,8,0.4); }
.tk.on { background:#facc15; }
#times { display:flex; justify-content:space-between; position:absolute; top:0; left:0; right:0; }
.tm { font-size:8px; color:rgba(234,179,8,0.35); white-space:nowrap; }
.tm.on { color:#facc15; font-weight:700; }

@keyframes bf { 0%{opacity:0;transform:scale(0.2)} 20%{opacity:1;transform:scale(1.5)} 60%{opacity:0.8} 100%{opacity:0} }
.bolt { animation:bf 2.5s ease-out forwards; font-size:18px; filter:drop-shadow(0 0 10px #facc15); }
</style>
</head>
<body>

<div id="header">
  <div id="logo">⚡ STORMRADAR <span>FRANCE</span></div>
  <div id="hcount">⚡ 0 impacts</div>
  <div id="htime">--:--</div>
  <div id="source">MF RADAR</div>
  <div class="lpill"><div class="ldot"></div>LIVE</div>
</div>

<div id="map"></div>

<div id="layers">
  <div class="lb on" id="lb-radar"  onclick="setMode('radar')">🌧 Radar MF</div>
  <div class="lb"    id="lb-sat"    onclick="setMode('sat')">🛰 Satellite</div>
  <div class="lb"    id="lb-foudre" onclick="toggleFoudre()">⚡ Foudre</div>
  <div class="lb"    id="lb-cape"   onclick="toggleCape()">🌩 CAPE</div>
</div>

<div id="legend">
  <div id="leg-title">PRÉCIPITATIONS mm/h</div>
  <div class="lr"><div class="lc" style="background:linear-gradient(90deg,#a0d0ff,#60aaff)"></div>&lt; 1</div>
  <div class="lr"><div class="lc" style="background:linear-gradient(90deg,#00cc44,#aaff00)"></div>1 – 5</div>
  <div class="lr"><div class="lc" style="background:linear-gradient(90deg,#ffee00,#ffaa00)"></div>5 – 20</div>
  <div class="lr"><div class="lc" style="background:linear-gradient(90deg,#ff4400,#ff0000)"></div>20 – 50</div>
  <div class="lr"><div class="lc" style="background:linear-gradient(90deg,#cc00ff,#ff00cc)"></div>&gt; 50</div>
</div>

<div id="timeline">
  <div id="tl-row">
    <div class="cb" onclick="step(-1)">◀</div>
    <div class="cb" id="playbtn" onclick="togglePlay()">▶</div>
    <div class="cb" onclick="step(1)">▶▶</div>
    <div id="tl-info">← PASSÉ &nbsp;|&nbsp; PRÉSENT →</div>
  </div>
  <div id="scrubber" onmousedown="startScrub(event)">
    <div id="scrubfill"></div>
    <div id="scrubhead"></div>
  </div>
  <div id="ticks-wrap">
    <div id="times"></div>
    <div id="ticks"></div>
  </div>
</div>

<script>
const PROXY   = 'https://lightning-proxy-6n9p.vercel.app/api/lightning'
const MF_BASE = 'https://public-api.meteofrance.fr/public/DPRadar/v1'
const RV      = 'https://api.rainviewer.com/public/weather-maps.json'

let mfToken = ''
let rvData  = null
let frames  = [], cur = 0
let radarLayer = null, capeLayer = null
let mode = 'radar', foudreOn = false, capeOn = false
let playing = false, playTimer = null
let bolts = [], lastTs = 0, nbImpacts = 0
let pollTimer = null, simTimer = null

// ── CARTE ─────────────────────────────────────────────────────
const map = L.map('map', { zoomControl:true, attributionControl:false })
             .setView([46.5, 2.5], 6)

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains:'abcd', maxZoom:18, minZoom:2
}).addTo(map)

;[
  ['Paris',48.85,2.35],['Lyon',45.75,4.85],['Marseille',43.30,5.37],
  ['Bordeaux',44.84,-0.58],['Toulouse',43.60,1.44],['Nantes',47.22,-1.55],
  ['Strasbourg',48.57,7.75],['Lille',50.63,3.06],['Nice',43.71,7.26],
  ['Rennes',48.11,-1.68],['Montpellier',43.61,3.88],['Grenoble',45.19,5.72],
  ['Brest',48.39,-4.49],['Metz',49.12,6.18],['Clermont',45.78,3.08]
].forEach(([n,lat,lng]) =>
  L.circleMarker([lat,lng],{radius:2.5,color:'#eab308',fillColor:'#eab308',fillOpacity:0.5,weight:1})
   .bindTooltip(n,{permanent:false,direction:'top',offset:[0,-4]}).addTo(map)
)

// ── INIT ───────────────────────────────────────────────────────
async function init() {
  // Récupère le token MF depuis le proxy Vercel
  try {
    const r = await fetch(`${PROXY}?mf-token=1`)
    const d = await r.json()
    mfToken = d.token || ''
  } catch(e) {}

  if (mfToken) {
    await loadMFRadar()
    document.getElementById('source').textContent = 'MÉTÉO-FRANCE'
  } else {
    await loadRVRadar()
    document.getElementById('source').textContent = 'RAINVIEWER'
  }
}

// ── MÉTÉO-FRANCE RADAR ─────────────────────────────────────────
async function loadMFRadar() {
  try {
    // Récupère la liste des derniers fichiers radar mosaïque
    const r = await fetch(`${MF_BASE}/mosaique/paquet`, {
      headers: { Authorization: `Bearer ${mfToken}` }
    })
    const d = await r.json()

    // Construit les frames depuis les timestamps disponibles
    frames = (d.liens || []).slice(-12).map((l, i) => ({
      url: l.href,
      time: Date.now()/1000 - (12-i)*300 // toutes les 5 min
    }))

    if (frames.length === 0) throw new Error('No MF frames')
    buildTimeline()
    goToFrameMF(frames.length - 1)
  } catch(e) {
    console.warn('MF radar failed, fallback RainViewer', e)
    await loadRVRadar()
  }
}

async function goToFrameMF(i) {
  cur = Math.max(0, Math.min(i, frames.length-1))
  if (radarLayer) { map.removeLayer(radarLayer); radarLayer = null }

  // Utilise le WMS Météo-France via le proxy pour éviter CORS
  const wmsUrl = `https://public-api.meteofrance.fr/public/DPRadar/v1/mosaique/wms`
  radarLayer = L.tileLayer.wms(wmsUrl, {
    layers: 'PRECIPITATIONS',
    format: 'image/png',
    transparent: true,
    opacity: 0.85,
    version: '1.3.0',
    headers: { Authorization: `Bearer ${mfToken}` },
    zIndex: 10
  }).addTo(map)

  updateTimeDisplay(frames[cur].time)
  updateScrub()
  updateTicks()
}

// ── RAINVIEWER (fallback) ──────────────────────────────────────
async function loadRVRadar() {
  try {
    const r = await fetch(RV)
    rvData  = await r.json()
    buildFramesRV()
    buildTimeline()
    goToFrameRV(frames.length - 1)
  } catch(e) { console.error('RainViewer:', e) }
}

function buildFramesRV() {
  if (mode === 'radar') {
    frames = [...(rvData?.radar?.past || [])]
    if (rvData?.radar?.nowcast) frames = frames.concat(rvData.radar.nowcast)
  } else {
    frames = [...(rvData?.satellite?.infrared || [])]
  }
}

function goToFrameRV(i) {
  cur = Math.max(0, Math.min(i, frames.length-1))
  if (!frames[cur]) return
  if (radarLayer) { map.removeLayer(radarLayer); radarLayer = null }
  const f     = frames[cur]
  const color = mode === 'sat' ? 0 : 6
  const url   = `${rvData.host}${f.path}/512/{z}/{x}/{y}/${color}/1_1.png`
  radarLayer  = L.tileLayer(url, {
    tileSize:512, opacity:0.88, maxNativeZoom:7,
    maxZoom:18, minZoom:2, zoomOffset:-1, zIndex:10
  }).addTo(map)
  updateTimeDisplay(f.time)
  updateScrub()
  updateTicks()
}

function goToFrame(i) {
  if (mfToken) goToFrameMF(i)
  else goToFrameRV(i)
}

// ── TIMELINE ───────────────────────────────────────────────────
function fmt(ts) {
  const d = new Date(ts*1000)
  return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`
}

function updateTimeDisplay(ts) {
  const d  = new Date(ts*1000)
  const hh = d.getHours().toString().padStart(2,'0')
  const mm = d.getMinutes().toString().padStart(2,'0')
  const dd = d.getDate().toString().padStart(2,'0')
  const mo = (d.getMonth()+1).toString().padStart(2,'0')
  document.getElementById('htime').textContent = `${dd}/${mo} ${hh}:${mm}`
}

function buildTimeline() {
  // Ticks
  document.getElementById('ticks').innerHTML = frames.map((f,i) =>
    `<div class="tk ${i===cur?'on':''}" onclick="goToFrame(${i})" title="${fmt(f.time)}"></div>`
  ).join('')
  // Heures
  const step = Math.max(1, Math.floor(frames.length/6))
  document.getElementById('times').innerHTML = frames
    .filter((_,i) => i%step===0 || i===frames.length-1)
    .map(f => `<div class="tm">${fmt(f.time)}</div>`)
    .join('')
}

function updateScrub() {
  const p = frames.length>1 ? (cur/(frames.length-1))*100 : 100
  document.getElementById('scrubfill').style.width = p+'%'
  document.getElementById('scrubhead').style.right = (100-p)+'%'
}

function updateTicks() {
  document.querySelectorAll('.tk').forEach((t,i) => t.classList.toggle('on', i===cur))
}

function step(d) { goToFrame(cur+d) }

function togglePlay() {
  playing = !playing
  const b = document.getElementById('playbtn')
  b.textContent = playing ? '⏸' : '▶'
  b.classList.toggle('on', playing)
  if (playing) {
    playTimer = setInterval(() => goToFrame(cur+1>=frames.length?0:cur+1), 600)
  } else { clearInterval(playTimer) }
}

function startScrub(e) {
  const move = ev => {
    const r = document.getElementById('scrubber').getBoundingClientRect()
    const p = Math.max(0, Math.min(1, (ev.clientX-r.left)/r.width))
    goToFrame(Math.round(p*(frames.length-1)))
  }
  move(e)
  const up = () => { document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up) }
  document.addEventListener('mousemove', move)
  document.addEventListener('mouseup', up)
}

// ── MODES ──────────────────────────────────────────────────────
function setMode(m) {
  mode = m
  document.getElementById('lb-radar').classList.toggle('on', m==='radar')
  document.getElementById('lb-sat').classList.toggle('on', m==='sat')
  document.getElementById('leg-title').textContent = m==='radar' ? 'PRÉCIPITATIONS mm/h' : 'SATELLITE IR'
  if (!mfToken) { buildFramesRV(); buildTimeline(); goToFrameRV(frames.length-1) }
}

// ── CAPE ───────────────────────────────────────────────────────
async function toggleCape() {
  capeOn = !capeOn
  document.getElementById('lb-cape').classList.toggle('on', capeOn)
  if (!capeOn) { if(capeLayer){map.removeLayer(capeLayer);capeLayer=null} return }
  const pts = [[48.85,2.35],[45.75,4.85],[43.30,5.37],[44.84,-0.58],[43.60,1.44],
    [47.22,-1.55],[48.57,7.75],[50.63,3.06],[43.71,7.26],[48.11,-1.68],
    [43.61,3.88],[45.19,5.72],[45.78,3.08],[47.39,0.69],[48.39,-4.49]]
  try {
    const r = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${pts.map(p=>p[0]).join(',')}&longitude=${pts.map(p=>p[1]).join(',')}&hourly=cape&forecast_days=1&timezone=Europe%2FParis`
    )
    const arr = await r.json()
    const data = Array.isArray(arr)?arr:[arr]
    capeLayer = L.layerGroup()
    const h = new Date().getHours()
    data.forEach((d,i) => {
      const cape = d.hourly?.cape?.[h]||0
      if (cape<50) return
      const col = cape>2000?'#ef4444':cape>1000?'#f97316':cape>400?'#facc15':'#4ade80'
      L.circle(pts[i],{radius:80000,color:col,fillColor:col,fillOpacity:0.1+Math.min(cape/2500,1)*0.35,weight:0.8})
       .bindTooltip(`CAPE : ${Math.round(cape)} J/kg`).addTo(capeLayer)
    })
    capeLayer.addTo(map)
  } catch(e) {}
}

// ── FOUDRE ─────────────────────────────────────────────────────
function toggleFoudre() {
  foudreOn = !foudreOn
  document.getElementById('lb-foudre').classList.toggle('on', foudreOn)
  if (foudreOn) { poll(); pollTimer=setInterval(poll,15000) }
  else {
    clearInterval(pollTimer); clearInterval(simTimer); simTimer=null
    bolts.forEach(m=>{try{map.removeLayer(m)}catch(e){}})
    bolts=[]; nbImpacts=0
    document.getElementById('hcount').textContent='⚡ 0 impacts'
  }
}

async function poll() {
  try {
    const r = await fetch(lastTs?`${PROXY}?since=${lastTs}`:PROXY,{cache:'no-store'})
    const d = await r.json()
    if (d.strikes?.length>0) {
      lastTs=d.ts; clearInterval(simTimer); simTimer=null
      d.strikes.forEach(s=>{
        if(s.lat<40||s.lat>52||s.lon<-6.5||s.lon>11) return
        addBolt(s.lat,s.lon,true); nbImpacts++
      })
      updCount()
    } else if (!simTimer) { simTimer=setInterval(simStep,3500); simStep() }
  } catch(e) { if(!simTimer){simTimer=setInterval(simStep,3500);simStep()} }
}

const ZONES=[[44.5,3.2],[43.5,5.8],[48.2,6.9],[45.0,1.5],[43.3,1.9],[46.5,4.8]]

function simStep() {
  if (!foudreOn) return
  const z=ZONES[Math.floor(Math.random()*ZONES.length)]
  const n=Math.floor(Math.random()*3)+1
  for(let i=0;i<n;i++){
    const lat=z[0]+(Math.random()-0.5)*1.8
    const lon=z[1]+(Math.random()-0.5)*1.8
    if(lat<41||lat>51.5||lon<-5.5||lon>10.5) continue
    addBolt(lat,lon,false); nbImpacts++
  }
  updCount()
}

function addBolt(lat,lon,real) {
  const icon=L.divIcon({html:'<div class="bolt">⚡</div>',className:'',iconSize:[20,20],iconAnchor:[10,10]})
  const m=L.marker([lat,lon],{icon,zIndex:50})
    .bindTooltip(real?'⚡ Impact réel':'⚡ Simulé',{sticky:true}).addTo(map)
  bolts.push(m)
  setTimeout(()=>{try{map.removeLayer(m)}catch(e){}},real?120000:2500)
  if(bolts.length>400) bolts.splice(0,bolts.length-400).forEach(m=>{try{map.removeLayer(m)}catch(e){}})
}

function updCount() {
  document.getElementById('hcount').textContent=`⚡ ${nbImpacts} impacts`
}

// ── START ──────────────────────────────────────────────────────
init()
</script>
</body>
</html>
