<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#0a0e14; font-family:system-ui,sans-serif; }
#map { position:absolute; top:50px; left:0; right:0; bottom:110px; z-index:1; }
.leaflet-control-attribution { display:none!important; }
.leaflet-control-zoom { border:1px solid rgba(234,179,8,0.3)!important; border-radius:8px!important; overflow:hidden; }
.leaflet-control-zoom a { background:#0d1117!important; color:#eab308!important; border-color:rgba(234,179,8,0.15)!important; }
.leaflet-tooltip { background:rgba(10,14,20,0.95)!important; border:1px solid rgba(234,179,8,0.35)!important; color:#facc15!important; font-size:11px!important; border-radius:7px!important; padding:5px 9px!important; box-shadow:none!important; }
.leaflet-tooltip::before { display:none!important; }

#header {
  position:absolute; top:0; left:0; right:0; height:50px; z-index:1000;
  background:#0a0e14; border-bottom:1px solid rgba(234,179,8,0.2);
  display:flex; align-items:center; padding:0 14px; gap:10px;
}
#logo { color:#facc15; font-size:14px; font-weight:900; letter-spacing:0.1em; flex:1; }
#logo span { color:rgba(234,179,8,0.35); font-weight:400; font-size:10px; margin-left:6px; }
#hcount { background:rgba(234,179,8,0.08); border:1px solid rgba(234,179,8,0.2); color:#facc15; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; white-space:nowrap; }
#htime { color:rgba(234,179,8,0.55); font-size:11px; white-space:nowrap; }
#hsource { font-size:9px; color:rgba(234,179,8,0.3); white-space:nowrap; letter-spacing:0.06em; }
.lpill { display:flex; align-items:center; gap:4px; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#f87171; font-size:10px; font-weight:800; padding:3px 8px; border-radius:20px; white-space:nowrap; }
.ldot { width:5px; height:5px; background:#ef4444; border-radius:50%; animation:lp 1.2s infinite; }
@keyframes lp { 0%,100%{opacity:1} 50%{opacity:0.1} }

#layers { position:absolute; top:58px; right:10px; z-index:1000; display:flex; flex-direction:column; gap:5px; }
.lb { background:rgba(10,14,20,0.95); border:1px solid rgba(234,179,8,0.2); color:rgba(234,179,8,0.45); font-size:11px; font-weight:700; padding:8px 14px; border-radius:8px; cursor:pointer; transition:all 0.2s; user-select:none; white-space:nowrap; }
.lb:hover { color:#eab308; border-color:rgba(234,179,8,0.5); background:rgba(234,179,8,0.06); }
.lb.on { color:#facc15; border-color:#facc15; background:rgba(234,179,8,0.12); }

#legend { position:absolute; top:58px; left:10px; z-index:1000; background:rgba(10,14,20,0.95); border:1px solid rgba(234,179,8,0.2); border-radius:10px; padding:10px 13px; min-width:150px; }
#leg-title { color:#eab308; font-size:9px; font-weight:800; letter-spacing:0.1em; margin-bottom:8px; }
.lr { display:flex; align-items:center; gap:8px; margin:5px 0; font-size:10px; color:rgba(255,255,255,0.55); }
.lc { width:28px; height:8px; border-radius:3px; flex-shrink:0; }

#timeline {
  position:absolute; bottom:0; left:0; right:0; height:110px; z-index:1000;
  background:#0a0e14; border-top:1px solid rgba(234,179,8,0.2);
  padding:10px 16px 12px; display:flex; flex-direction:column; gap:8px;
}
#tl-row { display:flex; align-items:center; gap:8px; }
.cb { background:rgba(234,179,8,0.07); border:1px solid rgba(234,179,8,0.2); color:#eab308; border-radius:7px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; width:32px; height:32px; transition:all 0.15s; user-select:none; flex-shrink:0; }
.cb:hover { background:rgba(234,179,8,0.18); border-color:#eab308; }
#playbtn { width:38px; height:38px; font-size:15px; border-radius:9px; }
#playbtn.on { background:rgba(234,179,8,0.2); border-color:#facc15; color:#facc15; }
#tl-info { flex:1; text-align:right; color:rgba(234,179,8,0.3); font-size:10px; letter-spacing:0.04em; }

#scrubber { position:relative; height:6px; background:rgba(234,179,8,0.1); border-radius:3px; cursor:pointer; }
#scrubfill { position:absolute; top:0; left:0; height:100%; background:linear-gradient(90deg,rgba(234,179,8,0.5),#facc15); border-radius:3px; pointer-events:none; }
#scrubhead { position:absolute; top:50%; width:12px; height:12px; background:#facc15; border-radius:50%; transform:translateY(-50%); pointer-events:none; box-shadow:0 0 8px rgba(234,179,8,0.7); transition:left 0.1s; }

#ticks-wrap { position:relative; height:30px; }
#ticks { display:flex; gap:2px; position:absolute; bottom:0; left:0; right:0; height:6px; }
.tk { flex:1; height:100%; background:rgba(234,179,8,0.1); border-radius:2px; cursor:pointer; transition:background 0.1s; position:relative; }
.tk:hover { background:rgba(234,179,8,0.4); }
.tk.on { background:#facc15; box-shadow:0 0 4px rgba(234,179,8,0.5); }
.tk.nc { background:rgba(234,179,8,0.06); border:1px solid rgba(234,179,8,0.15); }
.tk.nc.on { background:rgba(234,179,8,0.4); }
#times { position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; }
.tm { font-size:8px; color:rgba(234,179,8,0.3); white-space:nowrap; }
.tm.on { color:#facc15; font-weight:700; }

@keyframes bf { 0%{opacity:0;transform:scale(0.1)} 15%{opacity:1;transform:scale(1.6)} 50%{opacity:0.9;transform:scale(1)} 100%{opacity:0} }
.bolt { animation:bf 2.5s ease-out forwards; font-size:18px; filter:drop-shadow(0 0 10px #facc15) drop-shadow(0 0 20px rgba(250,204,21,0.4)); }
</style>
</head>
<body>

<div id="header">
  <div id="logo">⚡ STORMRADAR <span>FRANCE</span></div>
  <div id="hcount">⚡ 0 impacts</div>
  <div id="htime">--:--</div>
  <div id="hsource">RAINVIEWER</div>
  <div class="lpill"><div class="ldot"></div>LIVE</div>
</div>

<div id="map"></div>

<div id="layers">
  <div class="lb on" id="lb-radar"  onclick="setMode('radar')">🌧 Radar</div>
  <div class="lb"    id="lb-sat"    onclick="setMode('sat')">🛰 Satellite</div>
  <div class="lb"    id="lb-foudre" onclick="toggleFoudre()">⚡ Foudre</div>
  <div class="lb"    id="lb-cape"   onclick="toggleCape()">🌩 CAPE</div>
</div>

<div id="legend">
  <div id="leg-title">PRÉCIPITATIONS</div>
  <div class="lr"><div class="lc" style="background:#c8f0ff"></div>Bruine &lt;0.1</div>
  <div class="lr"><div class="lc" style="background:#0099ff"></div>Légère 0.1–1</div>
  <div class="lr"><div class="lc" style="background:#00dd44"></div>Modérée 1–5</div>
  <div class="lr"><div class="lc" style="background:#ffee00"></div>Forte 5–20</div>
  <div class="lr"><div class="lc" style="background:#ff6600"></div>Très forte 20–50</div>
  <div class="lr"><div class="lc" style="background:#ff0000"></div>Extrême &gt;50</div>
  <div class="lr"><div class="lc" style="background:#cc00ff"></div>Grêle possible</div>
</div>

<div id="timeline">
  <div id="tl-row">
    <div class="cb" onclick="step(-1)" title="Précédent">◀</div>
    <div class="cb" id="playbtn" onclick="togglePlay()" title="Lecture">▶</div>
    <div class="cb" onclick="step(1)"  title="Suivant">▶▶</div>
    <div id="tl-info">← PASSÉ &nbsp;|&nbsp; PRÉSENT →</div>
  </div>
  <div id="scrubber" onmousedown="startScrub(event)">
    <div id="scrubfill" style="width:100%"></div>
    <div id="scrubhead" style="left:calc(100% - 6px)"></div>
  </div>
  <div id="ticks-wrap">
    <div id="times"></div>
    <div id="ticks"></div>
  </div>
</div>

<script>
const PROXY = 'https://lightning-proxy-6n9p.vercel.app/api/lightning'
const RV    = 'https://api.rainviewer.com/public/weather-maps.json'

// ── CARTE ──────────────────────────────────────────────────────
const map = L.map('map', { zoomControl:true, attributionControl:false })
             .setView([46.5, 2.5], 6)

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains:'abcd', maxZoom:18, minZoom:2
}).addTo(map)

;[
  ['Paris',48.85,2.35],['Lyon',45.75,4.85],['Marseille',43.30,5.37],
  ['Bordeaux',44.84,-0.58],['Toulouse',43.60,1.44],['Nantes',47.22,-1.55],
  ['Strasbourg',48.57,7.75],['Lille',50.63,3.06],['Nice',43.71,7.26],
  ['Rennes',48.11,-1.68],['Montpellier',43.61,3.88],['Grenoble',45.19,5.72],
  ['Brest',48.39,-4.49],['Metz',49.12,6.18],['Clermont',45.78,3.08],
  ['Dijon',47.32,5.04],['Tours',47.39,0.69],['Pau',43.30,-0.37]
].forEach(([n,lat,lng]) =>
  L.circleMarker([lat,lng],{
    radius:2.5, color:'#eab308', fillColor:'#eab308', fillOpacity:0.5, weight:1
  }).bindTooltip(n,{permanent:false,direction:'top',offset:[0,-4]}).addTo(map)
)

// ── STATE ──────────────────────────────────────────────────────
let rvData=null, frames=[], cur=0
let radarLayer=null, capeLayer=null
let mode='radar', foudreOn=false, capeOn=false
let playing=false, playTimer=null
let bolts=[], lastTs=0, nbImpacts=0
let pollTimer=null, simTimer=null
let ncStart=999 // index début nowcast

// ── RAINVIEWER ─────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch(RV)
    rvData  = await r.json()
    buildFrames()
    buildTimeline()
    goToFrame(frames.length - 1)
  } catch(e) { console.error('RV error:', e) }
}

function buildFrames() {
  if (mode === 'radar') {
    const past = rvData?.radar?.past || []
    const nc   = rvData?.radar?.nowcast || []
    ncStart = past.length
    frames  = [...past, ...nc]
  } else {
    ncStart = 999
    frames  = [...(rvData?.satellite?.infrared || [])]
  }
}

function goToFrame(i) {
  cur = Math.max(0, Math.min(i, frames.length-1))
  if (!frames[cur]) return
  if (radarLayer) { map.removeLayer(radarLayer); radarLayer=null }

  const f     = frames[cur]
  const color = mode === 'sat' ? 0 : 2
  // 512px tuiles avec maxNativeZoom 7 — meilleure résolution possible sur RV gratuit
  const url   = `${rvData.host}${f.path}/512/{z}/{x}/{y}/${color}/1_1.png`

  radarLayer = L.tileLayer(url, {
    tileSize: 512,
    zoomOffset: -1,
    opacity: 0.9,
    maxNativeZoom: 7,
    maxZoom: 18,
    minZoom: 2,
    zIndex: 10,
    crossOrigin: true,
  }).addTo(map)

  updateHeader(f.time)
  updateScrub()
  updateTicks()
}

function updateHeader(ts) {
  const d  = new Date(ts * 1000)
  const hh = d.getHours().toString().padStart(2,'0')
  const mm = d.getMinutes().toString().padStart(2,'0')
  const dd = d.getDate().toString().padStart(2,'0')
  const mo = (d.getMonth()+1).toString().padStart(2,'0')
  document.getElementById('htime').textContent = `${dd}/${mo} ${hh}:${mm}`
}

// ── TIMELINE ───────────────────────────────────────────────────
function fmt(ts) {
  const d = new Date(ts*1000)
  return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`
}

function buildTimeline() {
  // Ticks
  document.getElementById('ticks').innerHTML = frames.map((f,i) => {
    const isNc = i >= ncStart ? 'nc' : ''
    const isOn = i === cur ? 'on' : ''
    return `<div class="tk ${isNc} ${isOn}" onclick="goToFrame(${i})" title="${fmt(f.time)}"></div>`
  }).join('')

  // Heures — max 8 labels
  const total = frames.length
  const step  = Math.max(1, Math.floor(total / 7))
  const shown = []
  for (let i=0; i<total; i++) {
    if (i % step === 0 || i === total-1) shown.push(fmt(frames[i].time))
  }
  document.getElementById('times').innerHTML =
    shown.map(t => `<div class="tm">${t}</div>`).join('')
}

function updateScrub() {
  const pct = frames.length > 1 ? (cur/(frames.length-1))*100 : 100
  document.getElementById('scrubfill').style.width = pct + '%'
  document.getElementById('scrubhead').style.left  = `calc(${pct}% - 6px)`
}

function updateTicks() {
  document.querySelectorAll('.tk').forEach((t,i) => t.classList.toggle('on', i===cur))
  // Heures actives
  const step = Math.max(1, Math.floor(frames.length/7))
  document.querySelectorAll('.tm').forEach((t,i) => t.classList.toggle('on', i*step===cur || (i===document.querySelectorAll('.tm').length-1 && cur===frames.length-1)))
}

// ── CONTROLES ──────────────────────────────────────────────────
function step(d) { goToFrame(cur + d) }

function togglePlay() {
  playing = !playing
  const b = document.getElementById('playbtn')
  b.textContent = playing ? '⏸' : '▶'
  b.classList.toggle('on', playing)
  if (playing) {
    playTimer = setInterval(() =>
      goToFrame(cur+1 >= frames.length ? 0 : cur+1), 600)
  } else { clearInterval(playTimer) }
}

function startScrub(e) {
  const move = ev => {
    const r   = document.getElementById('scrubber').getBoundingClientRect()
    const pct = Math.max(0, Math.min(1, (ev.clientX-r.left)/r.width))
    goToFrame(Math.round(pct*(frames.length-1)))
  }
  move(e)
  const up = () => {
    document.removeEventListener('mousemove', move)
    document.removeEventListener('mouseup', up)
  }
  document.addEventListener('mousemove', move)
  document.addEventListener('mouseup', up)
}

// ── MODES ──────────────────────────────────────────────────────
function setMode(m) {
  mode = m
  document.getElementById('lb-radar').classList.toggle('on', m==='radar')
  document.getElementById('lb-sat').classList.toggle('on', m==='sat')
  document.getElementById('leg-title').textContent =
    m === 'radar' ? 'PRÉCIPITATIONS' : 'SATELLITE INFRAROUGE'
  buildFrames(); buildTimeline(); goToFrame(frames.length-1)
}

// ── CAPE ───────────────────────────────────────────────────────
async function toggleCape() {
  capeOn = !capeOn
  document.getElementById('lb-cape').classList.toggle('on', capeOn)
  if (!capeOn) { if(capeLayer){map.removeLayer(capeLayer);capeLayer=null} return }
  const pts = [
    [48.85,2.35],[45.75,4.85],[43.30,5.37],[44.84,-0.58],[43.60,1.44],
    [47.22,-1.55],[48.57,7.75],[50.63,3.06],[43.71,7.26],[48.11,-1.68],
    [43.61,3.88],[45.19,5.72],[45.78,3.08],[47.39,0.69],[48.39,-4.49]
  ]
  try {
    const r = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${pts.map(p=>p[0]).join(',')}&longitude=${pts.map(p=>p[1]).join(',')}&hourly=cape&forecast_days=1&timezone=Europe%2FParis`
    )
    const arr  = await r.json()
    const data = Array.isArray(arr) ? arr : [arr]
    capeLayer  = L.layerGroup()
    const h    = new Date().getHours()
    data.forEach((d,i) => {
      const cape = d.hourly?.cape?.[h] || 0
      if (cape < 50) return
      const col = cape>2000?'#ef4444':cape>1000?'#f97316':cape>400?'#facc15':'#4ade80'
      L.circle(pts[i], {
        radius:80000, color:col, fillColor:col,
        fillOpacity:0.1+Math.min(cape/2500,1)*0.35, weight:0.8
      }).bindTooltip(`CAPE : ${Math.round(cape)} J/kg`).addTo(capeLayer)
    })
    capeLayer.addTo(map)
  } catch(e) { console.error('CAPE:', e) }
}

// ── FOUDRE ─────────────────────────────────────────────────────
function toggleFoudre() {
  foudreOn = !foudreOn
  document.getElementById('lb-foudre').classList.toggle('on', foudreOn)
  if (foudreOn) {
    poll()
    pollTimer = setInterval(poll, 15000)
  } else {
    clearInterval(pollTimer)
    clearInterval(simTimer); simTimer=null
    bolts.forEach(m=>{try{map.removeLayer(m)}catch(e){}})
    bolts=[]; nbImpacts=0
    document.getElementById('hcount').textContent='⚡ 0 impacts'
  }
}

async function poll() {
  try {
    const url = lastTs ? `${PROXY}?since=${lastTs}` : PROXY
    const r   = await fetch(url, {cache:'no-store'})
    const d   = await r.json()
    if (d.strikes?.length > 0) {
      lastTs = d.ts
      clearInterval(simTimer); simTimer=null
      d.strikes.forEach(s => {
        if(s.lat<40||s.lat>52||s.lon<-6.5||s.lon>11) return
        addBolt(s.lat, s.lon, true); nbImpacts++
      })
      updCount()
    } else if (!simTimer) {
      simTimer = setInterval(simStep, 3500)
      simStep()
    }
  } catch(e) {
    if (!simTimer) { simTimer=setInterval(simStep,3500); simStep() }
  }
}

const ZONES = [
  [44.5,3.2],[43.5,5.8],[48.2,6.9],[45.0,1.5],
  [43.3,1.9],[46.5,4.8],[47.5,7.1],[42.8,2.3]
]

function simStep() {
  if (!foudreOn) return
  const z = ZONES[Math.floor(Math.random()*ZONES.length)]
  const n = Math.floor(Math.random()*3)+1
  for(let i=0; i<n; i++){
    const lat = z[0]+(Math.random()-0.5)*1.8
    const lon = z[1]+(Math.random()-0.5)*1.8
    if(lat<41||lat>51.5||lon<-5.5||lon>10.5) continue
    addBolt(lat, lon, false); nbImpacts++
  }
  updCount()
}

function addBolt(lat, lon, real) {
  const icon = L.divIcon({
    html:'<div class="bolt">⚡</div>',
    className:'', iconSize:[20,20], iconAnchor:[10,10]
  })
  const m = L.marker([lat,lon],{icon,zIndex:50})
    .bindTooltip(real?'⚡ Impact réel':'⚡ Simulé',{sticky:true})
    .addTo(map)
  bolts.push(m)
  setTimeout(()=>{try{map.removeLayer(m)}catch(e){}}, real?120000:2500)
  if(bolts.length>400)
    bolts.splice(0,bolts.length-400).forEach(m=>{try{map.removeLayer(m)}catch(e){}})
}

function updCount() {
  document.getElementById('hcount').textContent = `⚡ ${nbImpacts} impacts`
}

// ── REFRESH AUTO ───────────────────────────────────────────────
setInterval(async () => {
  try {
    const r = await fetch(RV)
    rvData  = await r.json()
    buildFrames(); buildTimeline()
    if (!playing) goToFrame(frames.length-1)
  } catch(e) {}
}, 300000)

// ── START ──────────────────────────────────────────────────────
init()
</script>
</body>
</html>
